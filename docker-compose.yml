version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anphat-erp-app-dev
    ports:
      - "3030:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/anphat_erp?sslmode=disable
      - NODE_ENV=development
      - JWT_SECRET="adsfpqwergadfnpg_UmYuKibaZf20ljli123asdfgoihjnqbOInkjHUne"
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm dev
    restart: unless-stopped

  db:
    image: postgres:latest
    container_name: anphat-erp-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anphat_erp
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data: